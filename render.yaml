services:
  # Serviço Web (FastAPI via Docker)
  - type: web
    name: mario-transport-web
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mario-transport-db
          property: connectionString


# Banco de Dados (PostgreSQL)
databases:
  - name: mario-transport-db
    databaseName: transport_db
    user: mario_user
    plan: free # Você pode mudar para 'starter' se precisar de persistência fora do free tier
